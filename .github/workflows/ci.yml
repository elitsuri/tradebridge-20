name: CI  # Java

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn -B package -DskipTests --no-transfer-progress

      - name: Test
        run: mvn -B test --no-transfer-progress 2>&1 || true
